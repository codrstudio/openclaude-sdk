name: Publish tarball to release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  upload-tarball:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm ci
      - run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" *.tgz --clobber
